<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will you go briskwalk with me? </title>
<style>
  * { box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    margin: 0;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffdde1, #ffc3d0, #ffe0ec);
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    overflow: hidden;
    position: relative;
    padding: 16px;
  }

  .heart {
    position: fixed;
    top: -10%;
    font-size: 20px;
    opacity: 0.7;
    animation: fall linear infinite;
    pointer-events: none;
    user-select: none;
  }

  @keyframes fall {
    to {
      transform: translateY(110vh) rotate(360deg);
    }
  }

  .card {
    background: #fff;
    border-radius: 30px;
    padding: clamp(28px, 8vw, 50px) clamp(20px, 6vw, 40px);
    text-align: center;
    box-shadow: 0 20px 50px rgba(255, 105, 135, 0.35);
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 400px;
    animation: pop 0.6s ease;
  }

  @keyframes pop {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  h1 {
    color: #ff5c8a;
    font-size: clamp(1.3rem, 6vw, 1.8rem);
    margin-bottom: 10px;
  }

  .sub {
    color: #ff8fab;
    margin-bottom: 30px;
    font-size: clamp(0.85rem, 3.5vw, 1rem);
  }

  .bear {
    font-size: clamp(2.8rem, 12vw, 4rem);
    animation: wiggle 2s ease-in-out infinite;
    margin-bottom: 10px;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  .buttons {
    position: relative;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    align-items: center;
    min-height: 70px;
  }

  button {
    border: none;
    border-radius: 50px;
    padding: clamp(13px, 4vw, 16px) clamp(24px, 7vw, 34px);
    font-size: clamp(0.95rem, 4vw, 1.1rem);
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    touch-action: manipulation;
    white-space: nowrap;
  }

  #yesBtn {
    background: linear-gradient(135deg, #ff9ec6, #ff5c8a);
    color: white;
    box-shadow: 0 8px 20px rgba(255, 92, 138, 0.5);
  }

  #yesBtn:hover {
    transform: scale(1.1);
  }

  #yesBtn.grow {
    padding: clamp(17px, 5.5vw, 22px) clamp(30px, 9vw, 46px);
    font-size: clamp(1.1rem, 5vw, 1.4rem);
  }

  #noBtn {
    background: #f1f1f1;
    color: #888;
    position: relative;
    z-index: 3;
  }

  #noBtn.escaping {
    position: fixed;
  }

  #noBtn.dodge-anim {
    animation: dodge-shake 0.4s ease;
  }

  @keyframes dodge-shake {
    0%   { transform: rotate(0deg) scale(1); }
    15%  { transform: rotate(-15deg) scale(0.9); }
    30%  { transform: rotate(12deg) scale(1.05); }
    45%  { transform: rotate(-10deg) scale(0.95); }
    60%  { transform: rotate(8deg) scale(1.05); }
    75%  { transform: rotate(-5deg) scale(0.97); }
    100% { transform: rotate(0deg) scale(1); }
  }

  /* peeking out shyly from behind the card */
  #noBtn.hiding {
    z-index: 1;
    opacity: 0.9;
    animation: peekaboo 0.5s ease;
  }

  @keyframes peekaboo {
    0%   { transform: scale(0.4) rotate(0deg); opacity: 0; }
    50%  { transform: scale(1.15) rotate(-8deg); opacity: 1; }
    70%  { transform: scale(0.9) rotate(6deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .success-screen, .name-screen {
    display: none;
  }

  .success-screen.show, .name-screen.show {
    display: block;
    animation: pop 0.5s ease;
  }

  .success-screen h1, .name-screen h1 {
    color: #ff4081;
  }

  .name-input {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid #ffc3d0;
    border-radius: 50px;
    font-size: 1rem;
    font-family: inherit;
    text-align: center;
    outline: none;
    margin-bottom: 16px;
    color: #ff5c8a;
  }

  .name-input:focus {
    border-color: #ff5c8a;
  }

  #submitNameBtn {
    background: linear-gradient(135deg, #ff9ec6, #ff5c8a);
    color: white;
    box-shadow: 0 8px 20px rgba(255, 92, 138, 0.5);
    width: 100%;
  }

  #submitStatus {
    margin-top: 12px;
    margin-bottom: 0;
    min-height: 1em;
  }

  .copyright {
    position: fixed;
    bottom: 8px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.7rem;
    color: #ffb3c6;
    z-index: 1;
  }

  .confetti {
    position: fixed;
    top: -10%;
    pointer-events: none;
    font-size: 22px;
    animation: fall linear forwards;
    z-index: 10;
  }

  .speech-bubble {
    position: fixed;
    background: #fff;
    color: #ff5c8a;
    border: 2px solid #ff9ec6;
    border-radius: 16px;
    padding: 8px 14px;
    font-size: 0.85rem;
    font-weight: bold;
    white-space: nowrap;
    box-shadow: 0 6px 16px rgba(255, 105, 135, 0.3);
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, 0) scale(0.6);
    transition: none;
  }

  .speech-bubble::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -8px;
    transform: translateX(-50%);
    border-width: 8px 8px 0 8px;
    border-style: solid;
    border-color: #ff9ec6 transparent transparent transparent;
  }

  .speech-bubble.flip::after {
    bottom: auto;
    top: -8px;
    border-width: 0 8px 8px 8px;
    border-color: transparent transparent #ff9ec6 transparent;
  }

  .speech-bubble.show {
    animation: bubble-pop 0.4s ease forwards;
  }

  @keyframes bubble-pop {
    0%   { opacity: 0; transform: translate(-50%, 0) scale(0.4) rotate(-6deg); }
    60%  { opacity: 1; transform: translate(-50%, 0) scale(1.1) rotate(3deg); }
    100% { opacity: 1; transform: translate(-50%, 0) scale(1) rotate(0deg); }
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div id="question">
    <div class="bear">Invitation</div>
    <h1>Will you go briskwalk with me?</h1>
    <p class="sub">choose wisely... 👀</p>
    <div class="buttons" id="buttonRow">
      <button id="yesBtn" onclick="sayYes()">Yes 💖</button>
      <button id="noBtn">No</button>
      <div class="speech-bubble" id="speechBubble"></div>
    </div>
  </div>

  <div class="name-screen" id="nameScreen">
    <div class="bear">🥰</div>
    <h1>Yay!! What's your name?</h1>
    <p class="sub">so I know who said yes 🥹</p>
    <input type="text" id="nameInput" class="name-input" placeholder="Your name" maxlength="50" />
    <button id="submitNameBtn" onclick="submitName()">Submit 💌</button>
    <p class="sub" id="submitStatus"></p>
  </div>

  <div class="success-screen" id="successScreen">
    <div class="bear">🥰🎉</div>
    <h1>Yayyy!! I knew it!! 💘</h1>
    <p class="sub">Can't wait to see you 🥹✨</p>
  </div>
</div>

<div class="copyright">Copyright Acap 2026</div>

<script>
  const heartsContainer = document.body;
  for (let i = 0; i < 25; i++) {
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = ['💗','💖','💕','💓','❤️'][Math.floor(Math.random()*5)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.animationDuration = (4 + Math.random() * 6) + 's';
    h.style.animationDelay = (Math.random() * 5) + 's';
    h.style.fontSize = (14 + Math.random() * 14) + 'px';
    heartsContainer.appendChild(h);
  }

  const card = document.getElementById('card');
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');
  const buttonRow = document.getElementById('buttonRow');
  const speechBubble = document.getElementById('speechBubble');
  let dodges = 0;
  let bubbleHideTimer = null;

  const texts = [
    "No 🙁", "Nope 😤", "Nuh-uh 😠", "Try again 😢", "Nice try 😾",
    "Not happening 😡", "Never!! 😭", "Absolutely not 🙅", "Catch me if you can 🏃💨",
    "You'll never find me 👻", "Nope nope nope 🐢", "Missed me! 😝",
    "Still no 🚫", "So close! 😜", "Not today 🌚", "Try harder 💪😹",
    "Getting tired 😩", "Give up yet? 🙃", "This is fun for me 😈"
  ];

  const hideTexts = ["Peekaboo! 🙈", "Can't catch me 👻", "Hiding here~ 🫣", "You can't see me 😏", "Boo! 👻"];

  function showSpeechBubble(text) {
    const btnRect = noBtn.getBoundingClientRect();
    const bubbleX = btnRect.left + btnRect.width / 2;

    speechBubble.textContent = text;
    speechBubble.classList.remove('show', 'flip');

    // measure once visible-ish, then decide whether it fits above the button
    speechBubble.style.left = bubbleX + 'px';
    speechBubble.style.top = '-999px';
    speechBubble.style.opacity = '0';
    const bubbleHeight = speechBubble.offsetHeight;

    const fitsAbove = btnRect.top - bubbleHeight - 14 > 0;
    if (fitsAbove) {
      speechBubble.style.top = (btnRect.top - bubbleHeight - 14) + 'px';
    } else {
      speechBubble.style.top = (btnRect.bottom + 14) + 'px';
      speechBubble.classList.add('flip');
    }

    speechBubble.style.opacity = '';
    void speechBubble.offsetWidth; // restart animation
    speechBubble.classList.add('show');

    clearTimeout(bubbleHideTimer);
    bubbleHideTimer = setTimeout(() => {
      speechBubble.classList.remove('show');
    }, 1800);
  }

  // place the button so it peeks out from behind the card, half-hidden
  function hideBehindCard() {
    const cardRect = card.getBoundingClientRect();
    const btnW = noBtn.offsetWidth;
    const btnH = noBtn.offsetHeight;
    const edge = Math.floor(Math.random() * 4); // 0 top, 1 right, 2 bottom, 3 left
    let x, y;

    switch (edge) {
      case 0:
        x = cardRect.left + Math.random() * (cardRect.width - btnW);
        y = cardRect.top - btnH * 0.4;
        break;
      case 1:
        x = cardRect.right - btnW * 0.35;
        y = cardRect.top + Math.random() * (cardRect.height - btnH);
        break;
      case 2:
        x = cardRect.left + Math.random() * (cardRect.width - btnW);
        y = cardRect.bottom - btnH * 0.55;
        break;
      default:
        x = cardRect.left - btnW * 0.35;
        y = cardRect.top + Math.random() * (cardRect.height - btnH);
    }

    noBtn.classList.add('escaping', 'hiding');
    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';
    showSpeechBubble(hideTexts[Math.floor(Math.random() * hideTexts.length)]);
  }

  function moveNoButton() {
    dodges++;

    // sometimes it gets shy and hides behind the card instead of just running off
    const shouldHide = dodges > 1 && Math.random() < 0.35;

    if (shouldHide) {
      hideBehindCard();
    } else {
      noBtn.classList.remove('hiding');

      const btnWidth = noBtn.offsetWidth;
      const btnHeight = noBtn.offsetHeight;
      const margin = 10;

      const maxX = window.innerWidth - btnWidth - margin;
      const maxY = window.innerHeight - btnHeight - margin;

      const randX = margin + Math.random() * (maxX - margin);
      const randY = margin + Math.random() * (maxY - margin);

      noBtn.classList.add('escaping');
      noBtn.style.left = randX + 'px';
      noBtn.style.top = randY + 'px';

      showSpeechBubble(texts[(dodges - 1) % texts.length]);
    }

    // Yes button grows a little more smug each time
    if (dodges <= 6) {
      yesBtn.classList.add('grow');
    }

    noBtn.classList.remove('dodge-anim');
    void noBtn.offsetWidth; // restart animation
    noBtn.classList.add('dodge-anim');
  }

  noBtn.addEventListener('mouseover', moveNoButton);

  // Mobile has no cursor, so a tap makes it run away angrily instead
  noBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    moveNoButton();
  });

  // Just in case someone manages to click it, it "breaks" and jumps away instead of succeeding
  noBtn.addEventListener('click', function(e) {
    e.preventDefault();
    moveNoButton();
  });

  const SHEET_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxAHm-hE17Y5Jn-JrPPTZiLq7GvWcITKQdCQ0Dtu0kKcFWDeilOPWMfK1EszHBk07P0/exec';

  function sayYes() {
    document.getElementById('question').style.display = 'none';
    document.getElementById('nameScreen').classList.add('show');
    document.getElementById('nameInput').focus();
  }

  function submitName() {
    const nameInput = document.getElementById('nameInput');
    const status = document.getElementById('submitStatus');
    const name = nameInput.value.trim();

    if (!name) {
      status.textContent = 'Please enter your name first! 🥺';
      status.style.color = '#ff5c8a';
      return;
    }

    document.getElementById('submitNameBtn').disabled = true;
    status.textContent = 'Sending... 💌';
    status.style.color = '#ff8fab';

    fetch(SHEET_ENDPOINT, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ name: name })
    })
      .then(showSuccess)
      .catch(showSuccess);
  }

  function showSuccess() {
    document.getElementById('nameScreen').classList.remove('show');
    document.getElementById('successScreen').classList.add('show');
    launchConfetti();
  }

  function launchConfetti() {
    const emojis = ['🎉','💖','🎊','💕','✨','🥳'];
    for (let i = 0; i < 60; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        c.style.left = Math.random() * 100 + 'vw';
        c.style.animationDuration = (2 + Math.random() * 3) + 's';
        c.style.fontSize = (16 + Math.random() * 16) + 'px';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }, i * 40);
    }
  }
</script>

</body>
</html>
